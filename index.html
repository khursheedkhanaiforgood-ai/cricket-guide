    const markdown = "# A Beginner's Guide to Cricket \ud83c\udfcf\n\n## Introduction\n\nWelcome to cricket! Whether you're curious about this ancient sport or want to understand what's happening when you watch a match, you're in the right place. Cricket is one of the **oldest team sports in the world**, with a rich history and exciting modern formats. Let's dive in!\n\n---\n\n## History of Cricket\n\n### The First Cricket Match\n\nThe first **recorded** cricket match was played in **1646** in Kent, England. However, cricket almost certainly existed before that \u2014 the 1646 record is simply the earliest we have written evidence for.\n\n### How It Began\n\n- Cricket is believed to have begun as a **children's game** in the villages of south-east England (Kent, Sussex, Surrey) sometime in the **late 1500s**\n- By the **early 1700s**, adults were playing it seriously, and people were even **betting large amounts of money** on matches\n- The first match between **two county teams** that we know about was **Kent vs Surrey in 1709**\n- The famous **Marylebone Cricket Club (MCC)** \u2014 which wrote the official rules \u2014 was founded in **1787**\n- **Lord's Cricket Ground** in London, the MCC's home ground, is still called *\"the home of cricket\"* today\n\n---\n\n## Glossary\n\n- **Batting**: The act of hitting the ball with a bat to score runs\n- **Bowling**: Throwing the ball towards the batter (called a \"bowler\")\n- **County Teams**: Regional teams that compete in domestic cricket\n- **Marylebone Cricket Club (MCC)**: The organization that established cricket's official rules\n- **Recorded Match**: A match that has written historical documentation\n- **Runs**: Points scored in cricket";
