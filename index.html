    const markdown = "# A Beginner's Guide to Cricket \ud83c\udfcf\n\n## Welcome!\n\nHello! Cricket might seem confusing at first, but don't worry \u2014 this guide will help you understand one of the world's most beloved sports. Whether you're curious about the famous players, how the game works, or what makes it so exciting, you'll find the answers here. Let's get started!\n\n---\n\n## Famous Players\n\n### The Greatest Batsman Ever: Don Bradman\n\n**Don Bradman** is widely considered the greatest batsman in cricket history.\n\n- Played for **Australia in the 1930s and 40s**\n- Had a **Test batting average of 99.94** \u2014 almost twice as good as any other player\n- Even modern legends like Sachin Tendulkar consider him the best\n- His statistical dominance is simply unmatched\n\n---\n\n### The Modern Legend: Sachin Tendulkar\n\n**Sachin Tendulkar** is often called **\"The God of Cricket\"** and is beloved globally.\n\n- Played from **1989 to 2013** \u2014 nearly 25 years\n- Holds the record for the **most international runs ever scored**\n- **First player to score 100 international centuries** (a century = 100+ runs in one innings)\n- Billions of fans consider him the greatest modern player\n- His longevity and consistency are legendary\n\n---\n\n### The Pioneer: Sunil Gavaskar\n\n**Sunil Gavaskar** (nicknamed **\"Sunny\"** or **\"The Little Master\"**) is a true cricket pioneer.\n\n- Played for **India from 1971 to 1987**\n- Was the **first batter ever to score 10,000 Test runs**\n- Set the standard that Sachin Tendulkar later surpassed\n- Faced the most fearsome fast bowlers in history \u2014 **without a helmet** \u2014 showing incredible courage\n- Made India believe they could compete with any cricket nation\n- His famous **1971 debut tour of West Indies** (774 runs) announced him as a generational talent\n\n**Quick Comparison:**\n\n| Player | Era | Test Runs | Test Average | Test Centuries |\n|---|---|---|---|---|\n| **Don Bradman** | 1928-1948 | 6,996 | **99.94** | 29 |\n| **Sunil Gavaskar** | 1971-1987 | 10,122 | 51.12 | 34 |\n| **Sachin Tendulkar** | 1989-2013 | 15,921 | 53.78 | 51 |\n\n---\n\n### Bangladesh's Greatest: Shakib Al Hasan\n\n**Shakib Al Hasan** is the greatest cricketer Bangladesh has ever produced.\n\n- Born **24 March 1987** in Magura, Bangladesh\n- An **all-rounder** \u2014 dangerous both as a batter and as a bowler (a rare and valuable skill)\n- Was ranked the **best all-rounder in the world** at his peak\n- Left-handed batter and left-arm spin bowler\n- Almost single-handedly **raised Bangladesh's reputation** in world cricket\n\n---\n\n### Other Legends Worth Knowing\n\n- \ud83c\uddfa\ud83c\udde6 **Garfield Sobers** (West Indies) \u2014 possibly the greatest all-rounder ever\n- \ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc65\udb40\udc6e\udb40\udc67\udb40\udc7f **Ian Botham** (England) \u2014 legendary all-rounder\n- \ud83c\udde6\ud83c\uddfa **Shane Warne** \u2014 many say the greatest bowler who ever lived\n- \ud83c\uddf5\ud83c\uddf0 **Imran Khan** (Pakistan) \u2014 brilliant all-rounder and World Cup winner\n\n---\n\n## What Is an All-Rounder?\n\nAn **all-rounder** is a player who is excellent at **both batting and bowling** \u2014 a rare and incredibly valuable skill.\n\n- Most players excel at one thing only\n- All-rounders can score big runs **and** get opposing batters out\n- This makes them doubly dangerous and unpredictable\n\n---\n\n## The Greatest Debate in Cricket\n\n**\"Who is the best cricketer ever?\"** is one of cricket's greatest arguments!\n\n### The Two Main Contenders\n\n**Don Bradman (Statistical GOAT):**\n- His numbers are so far ahead of everyone else, it's hard to argue\n- Average of 99.94 is literally twice as good as other greats\n- Played in a different era, making exact comparison difficult\n\n**Sachin Tendulkar (Modern GOAT):**\n- Dominated for nearly 25 years across all formats\n- More runs than anyone in cricket history\n- Played in the modern era, making him more relatable to today's fans\n- Global icon of cricket\n\n### The Simple Answer\n- If you're going by **pure statistics** \u2192 **Don Bradman**\n- If you're going by **modern era and global impact** \u2192 **Sachin Tendulkar**\n- **Gavaskar** was arguably more important to **Indian cricket's development**\n\n---\n\n## Quick Notes\n\n### Important: About Lionel Messi\n**Lionel Messi is a footballer (soccer player), not a cricketer.** He has no cricket career \u2014 easy mix-up when learning about sports! Messi's dominance of football is similar to how Don Bradman and Sachin Tendulkar dominated cricket. \ud83d\ude0a\n\n---\n\n## Glossary\n\n**All-rounder:** A player who is excellent at both batting and bowling\n\n**Batting average:** Total runs scored divided by the number of times out; higher averages indicate better batters\n\n**Batter:** A player who hits the ball and tries to score runs\n\n**Bowler:** A player who throws the ball at the batter (similar to a pitcher in baseball)\n\n**Century:** Scoring 100 or more runs in a single innings\n\n**Innings:** A period during which one team bats; the batter's turn to hit\n\n**International debut:** A player's first appearance in an official match for their country\n\n**Opening batter:** One of the first two batters to bat for their team\n\n**Runs:** Points scored in cricket (usually by hitting the ball and running between wickets)\n\n**Test cricket:** The longest format of cricket (can last up to 5 days); considered the sport's classic format\n\n**Wicket:** Either the three wooden sticks the batter stands in front of, or when a batter gets out\n\n---\n\n## Want to Learn More?\n\nThis guide has covered cricket's greatest players. Would you like to explore:\n- How batting and bowling actually work?\n- The different formats of cricket (Test, ODI, T20)?\n- The rules and scoring system?\n- Famous matches and tournaments?\n\nFeel free to ask anything about the game \u2014 cricket is a wonderful sport to discover! \ud83c\udfcf";
